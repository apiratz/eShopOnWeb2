name: eShopOnWeb AKS Deployment
on: workflow_dispatch
env:
  ACR_LOGIN_SERVER: aistraining.azurecr.io
  TAG_NAME: eshoponwebapp-012:1.0.2
  AZURE_RESOURCE_GROUP: ais-training
  AZURE_CLUSTER_NAME: aks-demo
jobs:
  build-container:
    if: false  
    runs-on: ubuntu-latest
    steps:
      - name: Check out source code
        uses: actions/checkout@v7

      - name: ACR Login
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Image
        run: |
          docker build -f src/Web/Dockerfile -t ${{ env.ACR_LOGIN_SERVER }}/${{env.TAG_NAME}} .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{env.TAG_NAME}}

  deploy-to-aks:
    # needs: build-container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: azure/aks-set-context@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ env.AZURE_CLUSTER_NAME }}
      - uses: azure/k8s-deploy@v1
        with:
          action: deploy
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.TAG_NAME }}
          manifests: |
            - .k8s/deployment.yaml
            - .k8s/service.yaml

          
